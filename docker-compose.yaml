version: '3.8'

services:
  rag-bot:
    build: .
    container_name: rag_assistant_app
    ports:
      - "8501:8501"
    volumes:
      - ./db:/app/db           # Зберігаємо базу даних локально
      - ./data:/app/data       # Синхронізуємо папку з документами
    env_file:
      - .env                   # Прокидаємо змінні оточення
    restart: always