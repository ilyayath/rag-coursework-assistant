services:
  rag-bot:
    build: .
    container_name: rag_assistant_app
    ports:
      - "8501:8501"
    volumes:
      - ./db:/app/db
      - ./data:/app/data
    env_file:
      - .env
    # Дозволяє контейнеру звертатись до Ollama на хост-машині (поза Docker).
    # На Linux додайте у .env: OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    # Перевіряє що застосунок відповідає кожні 30 секунд.
    # Після 3 невдалих спроб контейнер вважається нездоровим.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s